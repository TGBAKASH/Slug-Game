# Render Blueprint — two services:
# 1. Static Site: Frontend at slugterra.onrender.com (global CDN)
# 2. Web Service: API at slug-game.onrender.com (Node.js)

services:
  # Frontend — Global CDN
  - type: web
    name: slugterra
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /sequence/*
        name: Cache-Control
        value: public, max-age=2592000, immutable
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=86400
    routes:
      - type: rewrite
        source: /api/*
        destination: https://slug-game.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

  # Backend API
  - type: web
    name: slug-game
    runtime: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: DB_NAME
        value: slugterra
      - key: API_SECRET
        generateValue: true
